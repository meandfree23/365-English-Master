<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>365 English Master Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap');

        :root {
            --primary: #38bdf8;
            --secondary: #f43f5e;
            --bg-deep: #070c18;
            --bg-main: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--bg-deep);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .logo-area {
            padding: 40px 25px;
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #month-list {
            flex: 1;
            padding: 10px 15px;
            overflow-y: auto;
        }

        .month-item {
            display: flex;
            flex-direction: column;
            padding: 18px 20px;
            border-radius: 16px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .month-item:hover {
            background: rgba(56,189,248,0.08);
            border-color: var(--primary);
        }

        .month-item.active {
            background: var(--primary);
            color: var(--bg-deep);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(56,189,248,0.2);
        }

        .month-item span:first-child { font-size: 14px; font-weight: 800; }
        .month-item span:last-child { font-size: 11px; opacity: 0.7; margin-top: 4px; }

        /* Main Dashboard */
        .main-dashboard {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header-title h2 { font-size: 26px; font-weight: 900; color: var(--primary); }
        .header-title p { font-size: 14px; color: var(--text-dim); margin-top: 5px; font-weight: 500; }

        /* Day Selector */
        .day-selector {
            padding: 15px 40px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            flex-shrink: 0;
            background: rgba(255,255,255,0.01);
        }

        .day-btn {
            min-width: 65px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: var(--card-bg);
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .day-btn.active {
            background: var(--secondary);
            color: white;
            box-shadow: 0 8px 15px rgba(244,63,94,0.3);
        }

        /* Content Sections */
        .content {
            flex: 1;
            display: flex;
            padding: 30px 40px;
            gap: 30px;
            overflow: hidden;
        }

        .learning-path {
            flex: 1.2;
            overflow-y: auto;
            padding-right: 10px;
        }

        .essence-box {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 25px;
            border-left: 6px solid var(--secondary);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .essence-box h3 { font-size: 18px; color: var(--secondary); margin-bottom: 15px; letter-spacing: -0.5px; }
        .essence-box p { font-size: 20px; font-weight: 800; line-height: 1.5; color: var(--text-main); }

        .sentence-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .sentence-card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .sentence-card.active { border-color: var(--secondary); background: rgba(244,63,94,0.03); }

        .tag {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 10px;
            font-weight: 900;
            padding: 5px 12px;
            background: rgba(56,189,248,0.1);
            color: var(--primary);
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sentence-en { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
        .sentence-kr { font-size: 15px; color: var(--text-dim); margin-bottom: 8px; }
        .sentence-nuance { font-size: 13px; color: var(--secondary); font-weight: 700; }

        /* Neural Mastery Dashboard (Right) */
        .mastery-panel {
            flex: 0.8;
            background: var(--bg-deep);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .panel-title {
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #334155;
            text-align: center;
            margin-bottom: 60px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .v-icon {
            font-size: 100px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 30px rgba(56,189,248,0.3));
            animation: vibe 4s infinite ease-in-out;
        }

        @keyframes vibe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        .v-title { font-size: 28px; font-weight: 900; color: var(--text-main); margin-bottom: 15px; }
        .v-desc { font-size: 16px; color: var(--text-dim); line-height: 1.7; word-break: keep-all; }

        .neural-mapping {
            margin-top: 40px;
            width: 100%;
            padding: 25px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            display: none;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .map-label { font-size: 10px; font-weight: 900; color: var(--primary); letter-spacing: 2px; margin-bottom: 10px; }
        .map-val { font-size: 20px; font-weight: 900; color: white; }

        .audio-btn {
            background: rgba(56,189,248,0.1);
            border: none;
            color: var(--primary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .audio-btn:hover {
            background: var(--primary);
            color: var(--bg-deep);
            transform: scale(1.1);
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sentence-card {
            animation: cardFadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area">💎 365 MASTER</div>
        <div id="month-list"></div>
    </div>

    <div class="main-dashboard">
        <header>
            <div class="header-title">
                <h2 id="current-month-name">Month 1</h2>
                <p id="current-day-num">Day 1</p>
            </div>
        </header>

        <div class="day-selector" id="day-selector"></div>

        <div class="content">
            <div class="learning-path">
                <div class="essence-box">
                    <h3 id="core-verb-label">VERB: TAKE</h3>
                    <p id="governing-phrase">외부의 것을 내 의지로 '포획'하여 소유의 영역으로 끌어오다</p>
                </div>
                <div id="sentence-container"></div>
            </div>

            <div class="mastery-panel">
                <div class="panel-title">NEURAL MASTERY DASHBOARD</div>
                <div class="visual-container">
                    <div class="v-icon" id="mastery-icon">🎯</div>
                    <div class="v-title" id="mastery-title">Cognitive Capture</div>
                    <div class="v-desc" id="mastery-desc">대상을 내 소유의 영역으로 확정하는 본능적인 동사적 행위입니다.</div>
                    <div class="neural-mapping" id="neural-mapping">
                        <div class="map-label">NEURAL TARGET</div>
                        <div class="map-val" id="neural-target-val">POINT CAPTURE</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Data files -->
    <script src="data/month1.js"></script>
    <script src="data/month2.js"></script>
    <script src="data/month3.js"></script>

    <script>
        
        // Data is now loaded from external JS files
        window.dayData = window.dayData || {};
        
        const monthInfo = [
            { id: 1, name: "Month 1", theme: "4대 핵심 동사 (Take/Get/Have/Make)" },
            { id: 2, name: "Month 2", theme: "공간과 이동 (Go/Come/Put/Set)" },
            { id: 3, name: "Month 3", theme: "인지와 감각 (Look/See/Think/Feel)" },
            { id: 4, name: "Month 4", theme: "이미지 전치사 심층 마스터" }
        ];

        let activeMonth = 3;
        let activeDay = 61;

        function init() {
            renderMonths();
            // Start with Month 3 as it's the current target, but could be dynamic
            const savedDay = localStorage.getItem('activeDay') || 61;
            const savedMonth = Math.ceil(savedDay / 30) || 3;
            activeMonth = savedMonth;
            activeDay = parseInt(savedDay);
            
            renderDays(activeMonth);
            loadDay(activeDay);
        }

        function renderMonths() {
            const container = document.getElementById('month-list');
            container.innerHTML = '';
            monthInfo.forEach(m => {
                const div = document.createElement('div');
                div.className = `month-item ${m.id === activeMonth ? 'active' : ''}`;
                div.innerHTML = `
                    <div style="display: flex; flex-direction: column;">
                        <span style="font-weight: 700; font-size: 0.9rem; opacity: 0.9;">${m.name}</span>
                        <span style="font-size: 0.75rem; opacity: 0.7;">${m.theme}</span>
                    </div>
                `;
                div.onclick = () => {
                    activeMonth = m.id;
                    renderMonths();
                    renderDays(activeMonth);
                    // Load the first day of the selected month
                    loadDay((activeMonth - 1) * 30 + 1);
                };
                container.appendChild(div);
            });
        }

        function renderDays(m) {
            const container = document.getElementById('day-selector');
            container.innerHTML = '';
            const start = (m - 1) * 30 + 1;
            const end = m * 30;
            for (let d = start; d <= end; d++) {
                const btn = document.createElement('div');
                btn.className = `day-btn ${d === activeDay ? 'active' : ''}`;
                btn.id = 'day-btn-' + d;
                btn.innerText = 'D-' + d;
                btn.onclick = () => loadDay(d);
                container.appendChild(btn);
            }
        }

        function loadDay(d) {
            activeDay = d;
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById('day-btn-' + d);
            if (activeBtn) activeBtn.classList.add('active');

            const data = dayData[String(d)] || { governing: "Data not found", sentences: [] };
            
            document.getElementById('current-day-num').innerText = 'Day ' + d;
            document.getElementById('current-month-name').innerText = monthInfo[Math.ceil(d/30)-1].name;
            document.getElementById('core-verb-label').innerText = 'VERB: ' + (data.core || '???').toUpperCase();
            document.getElementById('governing-phrase').innerText = data.governing;

            // Mastery Box Default
            document.getElementById('mastery-icon').innerText = data.v || "✨";
            document.getElementById('mastery-title').innerText = data.vT || "Essence Discovery";
            document.getElementById('mastery-desc').innerText = data.vD || "지각과 인지의 신경망을 고도화하는 과정입니다.";
            document.getElementById('neural-mapping').style.display = 'none';

            // Sentences
            const container = document.getElementById('sentence-container');
            container.innerHTML = '';
            (data.sentences || []).forEach(s => {
                const card = document.createElement('div');
                card.className = 'sentence-card';
                card.innerHTML = `
                    <div class="tag">${s.eT || 'Target'}</div>
                    <div class="sentence-en">${s.txt || s.en}</div>
                    <div class="sentence-kr">${s.t || s.kr}</div>
                    <div class="sentence-nuance">${s.n || '신경망 매핑 활성화'}</div>
                `;
                card.onclick = () => {
                    document.querySelectorAll('.sentence-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    
                    document.getElementById('mastery-title').innerText = s.eT || "Neural Mapping";
                    document.getElementById('mastery-desc').innerText = s.eD || s.n || "지각의 본질을 파고듭니다.";
                    document.getElementById('neural-mapping').style.display = 'block';
                    document.getElementById('neural-target-val').innerText = (s.eT || "MAPPING").toUpperCase();

                    // Audio
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(s.txt || s.en);
                        utterance.lang = 'en-US';
                        window.speechSynthesis.speak(utterance);
                    }
                };
                container.appendChild(card);
            });
        }

        init();
    </script>
</body>
</html>
