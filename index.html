<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native English 365 - All-in-One Dashboard v5.0</title>
    <style>
        :root {
            --primary: #FF5722;
            --primary-dark: #E64A19;
            --secondary: #2196F3;
            --bg-dark: #0F172A;
            --card-bg: #1E293B;
            --text-main: #F8FAFC;
            --text-dim: #94A3B8;
            --accent-glow: rgba(255, 87, 34, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: #111827;
            padding: 24px;
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            padding-bottom: 0.5rem;
        }

        .month-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .month-item:hover, .month-item.active {
            background-color: var(--card-bg);
            color: white;
        }

        /* Main Container */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 20px 40px;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .day-scroller {
            padding: 12px 40px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            background: #0B1120;
            scrollbar-width: thin;
        }

        .day-tab {
            padding: 8px 18px;
            background: #1E293B;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            color: var(--text-dim);
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .day-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Content Area */
        .content-area-wrapper {
            flex: 1;
            padding: 30px 40px;
            display: flex;
            gap: 30px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .logic-panel { flex: 1.2; display: flex; flex-direction: column; }
        .visual-panel { flex: 0.8; position: sticky; top: 0; }

        .governing-box {
            background: #1E293B;
            padding: 24px;
            border-radius: 12px;
            border-left: 6px solid var(--primary);
            margin-bottom: 25px;
            font-size: 1.25rem;
            font-weight: 800;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* Sentence List */
        .sentence-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .sentence-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--primary);
        }

        .sentence-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .sentence-main {
            flex: 1;
        }

        .sentence-txt {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .sentence-nuance {
            font-size: 0.95rem;
            color: var(--primary);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .play-btn {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 15px;
            font-size: 1.2rem;
            color: var(--text-main);
        }

        .play-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
        }

        .play-btn:active { transform: scale(0.95); }

        .play-btn.playing {
            background: var(--secondary);
            animation: pulse-glow 1s infinite;
        }

        .situation-box {
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--text-dim);
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 8px;
            display: none;
            line-height: 1.5;
        }

        .sentence-card.active .situation-box {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Essential Animations */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(33, 150, 243, 0); }
            100% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0); }
        }

        @keyframes take-grab {
            0% { transform: translate(150px, -150px) scale(0.5); opacity: 0; }
            45% { transform: translate(0, 0) scale(1.3); opacity: 1; }
            60% { transform: translate(0, 0) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); box-shadow: 0 0 50px var(--primary); }
        }

        /* Visual Box */
        .visual-box {
            background: radial-gradient(circle at center, #1E293B 0%, #0F172A 100%);
            border-radius: 24px;
            height: 480px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .essence-target {
            width: 140px;
            height: 140px;
            background: var(--primary);
            border-radius: 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.2rem;
            font-weight: 800;
            z-index: 2;
            box-shadow: 0 0 40px var(--accent-glow);
            animation: core-vib 3s infinite linear;
        }

        .essence-object {
            position: absolute;
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            z-index: 3;
            animation: take-grab 3s infinite ease-in-out;
        }

        @keyframes core-vib {
            0%, 100% { transform: rotate(-3deg) scale(1); }
            50% { transform: rotate(3deg) scale(1.05); }
        }

        /* Responsive Scroll */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Native English 365</h2>
        <div id="month-list">
            <div class="month-item active" onclick="selectMonth(1)">Month 1: 4대 핵심 동질</div>
            <div class="month-item" onclick="selectMonth(2)">Month 2: 공간과 이동</div>
            <div class="month-item" onclick="selectMonth(3)">Month 3: 인지와 감각</div>
        </div>
    </div>

    <div class="main-container">
        <header>
            <h1 id="month-title">Month 1: Take의 본질 마스터</h1>
            <div style="font-size: 0.9rem; color: var(--text-dim);">TTS Engine: Built-in Native Voices (M/F 50:50)</div>
        </header>

        <div class="day-scroller" id="day-tabs"></div>

        <div class="content-area-wrapper">
            <div class="logic-panel">
                <div class="governing-box" id="gov-box">데이터를 불러오는 중...</div>
                <div id="sentence-container"></div>
            </div>

            <div class="visual-panel">
                <div class="visual-box">
                    <div class="essence-object" id="v-obj">🎯</div>
                    <div class="essence-target" id="v-core">Take</div>
                    <div style="margin-top: 50px; text-align: center;">
                        <h2 id="v-title" style="margin-bottom: 8px;">낚아채기</h2>
                        <p id="v-desc" style="color: var(--text-dim); font-size: 0.9rem;">대상을 내 주도권 안의 영역으로 고정함</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dayData = {
            1: {
                governing: "너 내 거야! 내 통제권 안에 꽉 쥐어 잡다",
                sentences: [
                    { txt: "He took responsibility for the mistake.", n: "피하지 않고 실수를 내 책임으로 낚아챔", s: "팀원의 실수나 자신의 잘못에 대해 리더가 책임을 지겠다고 나설 때", g: "M" },
                    { txt: "She took charge of the project.", n: "프로젝트 통제권을 내 것으로 만들어 이끌기", s: "새로운 프로젝트 리더로 발탁되어 팀을 이끌기 시작할 때", g: "F" },
                    { txt: "I'll take responsibility for you.", n: "상대를 내 영역 안에 두고 책임지려는 의지", s: "연인이나 팀원에게 든든하게 지켜주겠다며 믿음을 줄 때", g: "M" },
                    { txt: "Good leaders take initiative.", n: "남보다 먼저 주도권을 잡고 행동하는 태도", s: "솔선수범의 중요성을 회의에서 강조할 때", g: "F" },
                    { txt: "The government must take action.", n: "관망 대신 실제 행동을 주도적으로 취함", s: "사회적 문제 해결을 위해 적극적 개입을 촉구할 때", g: "M" },
                    { txt: "You need to take responsibility for that water.", n: "주어진 물건의 관리 책임을 가져가라", s: "아이가 물을 쏟지 않게 스스로 잘 관리하라고 당부할 때", g: "F" },
                    { txt: "He took control of the situation.", n: "혼란스러운 상황을 꽉 잡아 내 것으로 만듦", s: "위기 시 누군가 나서서 상황을 진정시킬 때", g: "M" },
                    { txt: "She took the initiative to solve it.", n: "주저 없이 먼저 나서서 해결책을 쟁취함", s: "난제를 아무도 맡지 않을 때 자원해서 해결할 때", g: "F" },
                    { txt: "We need to take measures for this.", n: "예방 조치를 능동적으로 가져와 적용함", s: "재발 방지 대책 회의를 진행할 때", g: "M" },
                    { txt: "You can take the lead.", n: "이끄는 역할을 네가 차지하라는 양보", s: "동료에게 앞장서 볼 기회를 줄 때", g: "F" }
                ],
                v: "🎯", vT: "주도권(Control)", vD: "내 영역으로 낚아채는 에너지"
            },
            2: {
                governing: "위험을 내 것으로 감수하는 결단",
                sentences: [
                    { txt: "Sometimes you should just take a risk.", n: "위험을 내 것으로 만들어 부딪힘", s: "결정을 앞두고 망설이는 친구에게 조언할 때", g: "F" },
                    { txt: "We take chances.", n: "수동적 기다림 대신 기회를 능동적으로 잡아춤", s: "새로운 도전을 시작하며 자신 있게 말할 때", g: "M" },
                    { txt: "I'll take the risk.", n: "결과가 어떻든 전적으로 내가 책임지고 감수함", s: "모두 반대하는 프로젝트를 강행할 때", g: "F" },
                    { txt: "He took a risk.", n: "위험을 자신의 선택으로 마주함", s: "직장을 그만두고 꿈을 향해 나아갔다고 할 때", g: "M" },
                    { txt: "Don't take too big of a risk.", n: "지나친 위험을 통제하려는 것을 경계함", s: "무리한 투자를 하려는 사람을 말릴 때", g: "F" },
                    { txt: "You need to take a risk to succeed.", n: "성공을 위해 위험 감수 과정이 필수적임", s: "안주하려는 후배에게 동기를 부여할 때", g: "M" },
                    { txt: "Let's take a chance on this.", n: "이 기회를 한 번 우리 것으로 잡아보자", s: "여행 중 낯설고 흥미로운 장소를 발견했을 때", g: "F" },
                    { txt: "I don't think we should take that risk.", n: "위험을 굳이 우리 통제권에 넣지 않겠다는 거절", s: "신중하게 제안을 거절할 때", g: "M" },
                    { txt: "Are you trying to take too big of a chance?", n: "감당 힘든 무모한 위험을 지적함", s: "위험한 결정을 내리려는 지인을 걱정할 때", g: "F" },
                    { txt: "Taking this risk is too dangerous.", n: "통제 불가능할 정도의 위험을 경계함", s: "폭풍우에 등산을 강행하려는 일행을 말릴 때", g: "M" }
                ],
                v: "🔥", vT: "리스크(Risk)", vD: "위험을 통제하려는 의지"
            }
        };

        const synth = window.speechSynthesis;
        let voices = [];

        function loadVoices() {
            voices = synth.getVoices();
        }
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        function speak(text, gender) {
            if (synth.speaking) synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US';
            utter.rate = 0.9;
            
            // Gender Voice Logic
            const targetGender = gender === 'M' ? 'male' : 'female';
            const selectedVoice = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes(targetGender));
            if (selectedVoice) utter.voice = selectedVoice;
            
            synth.speak(utter);
            return utter;
        }

        function selectMonth(m) {
            document.querySelectorAll('.month-item').forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');
            generateTabs(m);
            loadDay((m-1)*30 + 1);
        }

        function generateTabs(m) {
            const container = document.getElementById('day-tabs');
            container.innerHTML = '';
            for(let i=1; i<=30; i++) {
                let d = (m-1)*30 + i;
                const tab = document.createElement('div');
                tab.className = 'day-tab' + (d===1?' active':'');
                tab.innerText = `Day ${d}`;
                tab.onclick = () => {
                    document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
                    tab.classList.add('active');
                    loadDay(d);
                };
                container.appendChild(tab);
            }
        }

        function loadDay(d) {
            const data = dayData[d] || { governing: "Day " + d + " 데이터 준비 중...", sentences: [], v: "⏳", vT: "Loading", vD: "..." };
            document.getElementById('gov-box').innerText = data.governing;
            document.getElementById('v-title').innerText = data.vT;
            document.getElementById('v-desc').innerText = data.vD;
            document.getElementById('v-obj').innerText = data.v;

            const list = document.getElementById('sentence-container');
            list.innerHTML = '';
            data.sentences.forEach((s, idx) => {
                const card = document.createElement('div');
                card.className = 'sentence-card';
                card.innerHTML = `
                    <div class="sentence-header">
                        <div class="sentence-main">
                            <div class="sentence-txt">${s.txt}</div>
                            <div class="sentence-nuance">${s.n}</div>
                        </div>
                        <div class="play-btn" id="play-${idx}">${s.g === 'M' ? '👨' : '👩'}</div>
                    </div>
                    <div class="situation-box">💡 상황: ${s.s}</div>
                `;
                
                card.onclick = (e) => {
                    if (e.target.classList.contains('play-btn')) return;
                    card.classList.toggle('active');
                };

                const btn = card.querySelector('.play-btn');
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const utter = speak(s.txt, s.g);
                    btn.classList.add('playing');
                    utter.onend = () => btn.classList.remove('playing');
                };

                list.appendChild(card);
            });
        }

        // Init
        loadVoices();
        generateTabs(1);
        loadDay(1);
    </script>
</body>
</html>
